<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gurgaon Property Leads — Buyer Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- ─── Navbar ─── -->
  <nav class="navbar">
    <div class="nav-brand">
      <div class="nav-icon">🏠</div>
      <div>
        <div class="nav-title">Gurgaon Property Leads</div>
        <div class="nav-sub">Buyer & Seller Lead Tracker</div>
      </div>
    </div>
    <div class="nav-actions">
      <span class="nav-user" id="navUser"></span>
      <button class="btn btn-outline" id="btnExport">Export CSV</button>
      <button class="btn btn-primary" id="btnNewLead">+ New Lead</button>
      <button class="btn btn-outline btn-logout" id="btnLogout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- ─── Stats ─── -->
  <section class="stats-row" id="statsRow"></section>

  <!-- ─── Filters ─── -->
  <section class="controls">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search by name, phone, or notes..." />
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <label class="filter-label">City</label>
        <select id="filterCity" class="filter-select">
          <option value="all">All Cities</option>
          <option value="Gurgaon">Gurgaon</option>
          <option value="Ludhiana">Ludhiana</option>
          <option value="Patiala">Patiala</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Area / Sector</label>
        <select id="filterArea" class="filter-select"><option value="all">All Areas</option></select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Budget Range</label>
        <select id="filterBudget" class="filter-select">
          <option value="all">Any Budget</option>
          <option value="under50">Under ₹50 Lakh</option>
          <option value="50to1cr">₹50L – ₹1 Cr</option>
          <option value="1to2cr">₹1 Cr – ₹2 Cr</option>
          <option value="2to5cr">₹2 Cr – ₹5 Cr</option>
          <option value="5to10cr">₹5 Cr – ₹10 Cr</option>
          <option value="above10cr">Above ₹10 Cr</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Property Type</label>
        <select id="filterType" class="filter-select">
          <option value="all">All Types</option>
          <option value="1BHK">1 BHK</option>
          <option value="2BHK">2 BHK</option>
          <option value="3BHK">3 BHK</option>
          <option value="4BHK">4 BHK</option>
          <option value="5BHK+">5 BHK+</option>
          <option value="Plot">Plot</option>
          <option value="Commercial">Commercial</option>
          <option value="Villa">Villa / Independent</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Status</label>
        <select id="filterStatus" class="filter-select">
          <option value="all">All</option>
          <option value="new">🟢 New</option>
          <option value="contacted">🟡 Contacted</option>
          <option value="interested">🔵 Interested</option>
          <option value="site-visit">🟠 Site Visit Done</option>
          <option value="negotiating">🟣 Negotiating</option>
          <option value="closed">✅ Closed / Won</option>
          <option value="lost">❌ Lost</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Lead Type</label>
        <select id="filterLeadType" class="filter-select">
          <option value="all">All</option>
          <option value="buyer">Buyer</option>
          <option value="seller">Seller</option>
          <option value="rental">Rental</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Source</label>
        <select id="filterSource" class="filter-select">
          <option value="all">All Sources</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Sort By</label>
        <select id="sortBy" class="filter-select">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="budget-high">Budget: High → Low</option>
          <option value="budget-low">Budget: Low → High</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
    </div>
  </section>

  <!-- ─── Leads Table ─── -->
  <section class="table-wrap">
    <table class="leads-table">
      <thead>
        <tr>
          <th>Lead</th>
          <th>Contact</th>
          <th>Looking For</th>
          <th>Area</th>
          <th>Budget</th>
          <th>Source</th>
          <th>Status</th>
          <th>Added</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="leadsBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No leads yet</div>
      <div class="empty-sub">Click "+ New Lead" to add your first potential buyer or seller</div>
    </div>
  </section>

  <!-- ─── Add/Edit Modal ─── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add New Lead</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form class="lead-form" id="leadForm">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="fName" required placeholder="e.g. Rajesh Sharma" />
          </div>
          <div class="form-group">
            <label>Phone *</label>
            <input type="tel" id="fPhone" required placeholder="e.g. 9876543210" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="fEmail" placeholder="e.g. rajesh@email.com" />
          </div>
          <div class="form-group">
            <label>Lead Type *</label>
            <select id="fLeadType" required>
              <option value="buyer">Buyer</option>
              <option value="seller">Seller</option>
              <option value="rental">Rental</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Property Type *</label>
            <select id="fPropertyType" required>
              <option value="">Select...</option>
              <option value="1BHK">1 BHK</option>
              <option value="2BHK">2 BHK</option>
              <option value="3BHK">3 BHK</option>
              <option value="4BHK">4 BHK</option>
              <option value="5BHK+">5 BHK+</option>
              <option value="Plot">Plot / Land</option>
              <option value="Commercial">Commercial (Office/Shop)</option>
              <option value="Villa">Villa / Independent House</option>
            </select>
          </div>
          <div class="form-group">
            <label>Preferred Area / Sector *</label>
            <select id="fArea" required>
              <option value="">Select area...</option>
              <optgroup label="Premium Corridors">
                <option value="Golf Course Road">Golf Course Road</option>
                <option value="Golf Course Ext Road (GCER)">Golf Course Extension Road (GCER)</option>
                <option value="Dwarka Expressway">Dwarka Expressway</option>
              </optgroup>
              <optgroup label="Established Areas">
                <option value="DLF Phase 1">DLF Phase 1</option>
                <option value="DLF Phase 2">DLF Phase 2</option>
                <option value="DLF Phase 3">DLF Phase 3</option>
                <option value="DLF Phase 4">DLF Phase 4</option>
                <option value="DLF Phase 5">DLF Phase 5</option>
                <option value="Sushant Lok 1">Sushant Lok 1</option>
                <option value="Sushant Lok 2">Sushant Lok 2</option>
                <option value="South City 1">South City 1</option>
                <option value="South City 2">South City 2</option>
                <option value="Sector 42-46">Sectors 42-46</option>
                <option value="Sector 47-49">Sectors 47-49 (Cyber City adj.)</option>
                <option value="Sector 54-57">Sectors 54-57</option>
              </optgroup>
              <optgroup label="Growth Corridors">
                <option value="Sohna Road">Sohna Road / South Gurugram</option>
                <option value="SPR (Southern Peripheral Rd)">SPR (Southern Peripheral Road)</option>
                <option value="Sector 58-67">Sectors 58-67 (GCER adjacent)</option>
                <option value="Sector 68-75">Sectors 68-75</option>
              </optgroup>
              <optgroup label="New Gurgaon">
                <option value="Sector 76-81">Sectors 76-81</option>
                <option value="Sector 82-89">Sectors 82-89</option>
                <option value="Sector 90-95">Sectors 90-95</option>
              </optgroup>
              <optgroup label="Dwarka Expressway Sectors">
                <option value="Sector 99-104 (Dwarka Exp)">Sectors 99-104</option>
                <option value="Sector 106-109 (Dwarka Exp)">Sectors 106-109</option>
                <option value="Sector 110-113 (Dwarka Exp)">Sectors 110-113</option>
              </optgroup>
              <optgroup label="Commercial / Other">
                <option value="Udyog Vihar">Udyog Vihar</option>
                <option value="Cyber City">DLF Cyber City</option>
                <option value="MG Road">MG Road</option>
                <option value="Palam Vihar">Palam Vihar</option>
                <option value="Manesar">Manesar / IMT</option>
                <option value="Other">Other (specify in notes)</option>
              </optgroup>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Min Budget (₹) *</label>
            <select id="fBudgetMin" required>
              <option value="">Select min...</option>
              <option value="0">No minimum</option>
              <option value="2000000">₹20 Lakh</option>
              <option value="3000000">₹30 Lakh</option>
              <option value="4000000">₹40 Lakh</option>
              <option value="5000000">₹50 Lakh</option>
              <option value="6000000">₹60 Lakh</option>
              <option value="7500000">₹75 Lakh</option>
              <option value="10000000">₹1 Crore</option>
              <option value="15000000">₹1.5 Crore</option>
              <option value="20000000">₹2 Crore</option>
              <option value="30000000">₹3 Crore</option>
              <option value="50000000">₹5 Crore</option>
              <option value="100000000">₹10 Crore</option>
            </select>
          </div>
          <div class="form-group">
            <label>Max Budget (₹) *</label>
            <select id="fBudgetMax" required>
              <option value="">Select max...</option>
              <option value="3000000">₹30 Lakh</option>
              <option value="4000000">₹40 Lakh</option>
              <option value="5000000">₹50 Lakh</option>
              <option value="6000000">₹60 Lakh</option>
              <option value="7500000">₹75 Lakh</option>
              <option value="10000000">₹1 Crore</option>
              <option value="15000000">₹1.5 Crore</option>
              <option value="20000000">₹2 Crore</option>
              <option value="30000000">₹3 Crore</option>
              <option value="50000000">₹5 Crore</option>
              <option value="100000000">₹10 Crore</option>
              <option value="150000000">₹15 Crore</option>
              <option value="999999999">₹15 Crore+</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Timeline</label>
            <select id="fTimeline">
              <option value="">Select...</option>
              <option value="Immediately">Immediately</option>
              <option value="1-3 months">1-3 months</option>
              <option value="3-6 months">3-6 months</option>
              <option value="6-12 months">6-12 months</option>
              <option value="Just exploring">Just exploring</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="fStatus">
              <option value="new">🟢 New</option>
              <option value="contacted">🟡 Contacted</option>
              <option value="interested">🔵 Interested</option>
              <option value="site-visit">🟠 Site Visit Done</option>
              <option value="negotiating">🟣 Negotiating</option>
              <option value="closed">✅ Closed / Won</option>
              <option value="lost">❌ Lost</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Source</label>
            <select id="fSource">
              <option value="">Select...</option>
              <option value="99acres">99acres</option>
              <option value="MagicBricks">MagicBricks</option>
              <option value="NoBroker">NoBroker</option>
              <option value="Housing.com">Housing.com</option>
              <option value="Google Ads">Google Ads</option>
              <option value="Facebook/Instagram">Facebook / Instagram</option>
              <option value="LinkedIn">LinkedIn</option>
              <option value="YouTube">YouTube</option>
              <option value="WhatsApp Group">WhatsApp Group</option>
              <option value="MyGate">MyGate</option>
              <option value="Builder Referral">Builder Referral</option>
              <option value="Client Referral">Client Referral</option>
              <option value="Walk-in">Walk-in</option>
              <option value="NRI Outreach">NRI Outreach</option>
              <option value="Expo/Event">Expo / Event</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Preferred Projects (optional)</label>
            <input type="text" id="fProjects" placeholder="e.g. DLF Camellias, M3M Golf Hills" />
          </div>
        </div>
        <div class="form-group full-width">
          <label>Notes / Requirements</label>
          <textarea id="fNotes" rows="3" placeholder="e.g. Needs park-facing, wants loan assistance, relocating from Bangalore by June..."></textarea>
        </div>
        <input type="hidden" id="fEditId" value="" />
        <div class="form-actions">
          <button type="button" class="btn btn-outline" id="btnCancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btnSave">Save Lead</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ─── Detail Modal ─── -->
  <div class="modal-overlay" id="detailOverlay">
    <div class="modal modal-detail" id="detailModal">
      <div class="modal-header">
        <h2 class="modal-title">Lead Details</h2>
        <button class="modal-close" id="detailClose">&times;</button>
      </div>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
